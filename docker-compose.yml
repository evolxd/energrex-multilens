services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_valuation
      POSTGRES_USER: valuation
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valuation -d ai_valuation"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://valuation:${PG_PASSWORD:-changeme}@postgres:5432/ai_valuation
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  pgdata:
